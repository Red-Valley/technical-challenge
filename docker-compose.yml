version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: medwork
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medwork-network

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=medwork
      - NODE_ENV=development
    depends_on:
      - postgres
    networks:
      - medwork-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  medwork-network:
    driver: bridge
