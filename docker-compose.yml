services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: technical-challenge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-technical_challenge}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - technical-challenge-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-technical_challenge}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend NestJS
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    container_name: technical-challenge-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-technical_challenge}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/technical_challenge?schema=public}
    ports:
      - '${API_PORT:-3000}:3000'
    volumes:
      - ./apps/backend:/app/apps/backend
      - /app/node_modules
      - /app/apps/backend/node_modules
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - technical-challenge-network
    command: >
      sh -c "
        echo '🚀 Iniciando configuración automática del backend...' &&
        echo '⏳ Esperando base de datos...' &&
        until cd /app/apps/backend && bun run prisma db push --accept-data-loss 2>/dev/null; do
          echo '⏳ Base de datos no disponible, esperando...' &&
          sleep 2
        done &&
        echo '✅ Base de datos disponible!' &&
        echo '🔧 Generando cliente de Prisma...' &&
        cd /app/apps/backend && bun run prisma generate &&
        echo '📦 Ejecutando migraciones...' &&
        cd /app/apps/backend && bun run prisma migrate deploy 2>/dev/null || (
          echo '⚠️ Migraciones no encontradas, usando db push...' &&
          cd /app/apps/backend && bun run prisma db push --accept-data-loss
        ) &&
        echo '✅ Migraciones completadas!' &&
        echo '🌱 Ejecutando seed...' &&
        cd /app/apps/backend && bun run prisma db seed &&
        echo '✅ Seed completado!' &&
        echo '🎉 Configuración completada!' &&
        echo '🚀 Iniciando servidor...' &&
        cd /app/apps/backend && bun run dev
      "

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: development
    container_name: technical-challenge-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_ENV: development
    ports:
      - '${FRONTEND_PORT:-3001}:3001'
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    depends_on:
      - backend
    networks:
      - technical-challenge-network
    command: ['bun', 'run', 'dev']

  # Adminer para gestión de base de datos (opcional)
  adminer:
    image: adminer:latest
    container_name: technical-challenge-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    depends_on:
      - postgres
    networks:
      - technical-challenge-network

volumes:
  postgres_data:
    driver: local

networks:
  technical-challenge-network:
    driver: bridge
